name: 🎵 XMusic CI

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: 🔨 Build APK (${{ matrix.build-type }})
    runs-on: ubuntu-24.04-arm64   # ARM64 native runner

    strategy:
      fail-fast: false
      matrix:
        build-type: [debug, release]

    steps:
      # ── 1. Kaynak kodu çek ────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 17 kur ───────────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle wrapper'ı çalıştırılabilir yap ─────────────────────
      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Gradle cache ───────────────────────────────────────────────
      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ runner.arch }}-
            gradle-${{ runner.os }}-

      # ── 5. Android SDK lisanslarını kabul et ──────────────────────────
      - name: 📝 Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 6. Debug build ────────────────────────────────────────────────
      - name: 🛠️ Build Debug APK
        if: matrix.build-type == 'debug'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Release build (imzasız) ────────────────────────────────────
      - name: 🚀 Build Release APK (unsigned)
        if: matrix.build-type == 'release'
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 8. APK dosyasını yeniden adlandır (commit hash ekle) ──────────
      - name: 🏷️ Rename APK with commit hash
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD="${{ matrix.build-type }}"

          APK_DIR="app/build/outputs/apk/${BUILD}"
          mkdir -p renamed_apks

          for apk in "$APK_DIR"/*.apk; do
            if [ -f "$apk" ]; then
              BASENAME=$(basename "$apk" .apk)
              cp "$apk" "renamed_apks/XMusic-${BUILD}-${COMMIT}.apk"
              echo "✅ Renamed: XMusic-${BUILD}-${COMMIT}.apk"
            fi
          done

      # ── 9. APK'yı artifact olarak yükle ──────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XMusic-${{ matrix.build-type }}-${{ github.sha }}
          path: renamed_apks/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 10. Build özeti ───────────────────────────────────────────────
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "### 🎵 XMusic Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | ${{ matrix.build-type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner Arch** | \`${{ runner.arch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Java** | 17 (Temurin) |" >> $GITHUB_STEP_SUMMARY

  # ── Lint kontrolü (ayrı job) ─────────────────────────────────────────
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-24.04-arm64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🔍 Run Lint
        run: ./gradlew lint --no-daemon --continue

      - name: 📤 Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.sha }}
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          retention-days: 7
          if-no-files-found: ignore
